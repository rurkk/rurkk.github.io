<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>График магнитной индукции</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div style="width: 80%; margin: auto;">
        <canvas id="myChart"></canvas>

        <div>
            <label for="radius">Радиус катушек:</label>
            <input type="number" id="radius" value="1">

            <label for="turns">Количество витков:</label>
            <input type="number" id="turns" value="1">

            <label for="current">Величина тока:</label>
            <input type="number" id="current" value="1">

            <button onclick="updateChart()">Обновить график</button>
        </div>
    </div>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');

        function calculateB(x, R, n, I) {
            return ((4e-7 * Math.PI * I * R**2 * n) / 2) * ((1 / (x**2 + R**2)**(3/2)) + (1 / ((x - R)**2 + R**2)**(3/2)));
        }

        var initialData = {
            labels: [],
            datasets: [{
                label: 'Магнитная индукция B(x)',
                data: [],
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 2,
                fill: false
            }]
        };

        var initialOptions = {
            scales: {
                x: {
                    type: 'linear',
                    position: 'bottom'
                },
                y: {
                    type: 'linear',
                    position: 'left'
                }
            }
        };

        var myChart = new Chart(ctx, {
            type: 'line',
            data: initialData,
            options: initialOptions
        });

        function updateChart() {
            var radius = parseFloat(document.getElementById('radius').value);
            var turns = parseFloat(document.getElementById('turns').value);
            var current = parseFloat(document.getElementById('current').value);

            var numberOfPoints = 1000; // Больше точек
var xValues = Array.from({ length: numberOfPoints }, (_, i) => i / 5 - numberOfPoints / 10);
            var yValues = xValues.map(x => calculateB(x, radius, turns, current));

            myChart.data.labels = xValues;
            myChart.data.datasets[0].data = yValues;
            myChart.update();
        }

        updateChart(); // Инициализация графика с параметрами по умолчанию
    </script>
</body>
</html>
